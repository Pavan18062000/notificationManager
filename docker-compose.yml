services:
  mysql:
    image: mysql:8.0
    container_name: zaps-communication-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zaps_communication
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - zaps_mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./zaps-communication-backend
    container_name: zaps-communication-backend
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/zaps_communication?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    ports:
      - "5000:5000"
    restart: on-failure

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: zaps-communication-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: zaps-communication-frontend
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  zaps_mysql_data:
